---
codecov:
  require_ci_to_pass: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

coverage:
  precision: 2
  round: down
  range: "70...90"
  status:
    project:
      default:
        base: auto
        threshold: 1%
  patch:
    default:
      target: 90%
      threshold: 10%

ignore:
  - "**/coverage.txt"
  - "testing"

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false
...
